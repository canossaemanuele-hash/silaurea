<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎓 SiLaurea App</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --primary: #2980b9; 
            --primary-hover: #1f618d;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
        }

        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: linear-gradient(135deg, var(--primary), #3498db); color: white; width: 100%; text-align: center; padding: 2rem 0; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; }
        h1 { margin: 0; font-weight: 600; letter-spacing: 1px; }

        nav { display: none; justify-content: center; gap: 8px; margin-top: -25px; background: var(--card-bg); padding: 10px 15px; border-radius: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); flex-wrap: wrap; z-index: 10; }
        nav button { background: transparent; border: none; padding: 8px 15px; border-radius: 20px; font-size: 14px; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: all 0.3s ease; }
        nav button:hover, nav button.active { background: var(--primary); color: white; }
        nav button.btn-esci { color: #e74c3c; }

        main { width: 95%; max-width: 900px; margin: 30px auto; }
        .section { display: none; background: var(--card-bg); padding: 20px; border-radius: 16px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); animation: fadeIn 0.4s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .badge-laureato { background: #e1f5fe; color: var(--primary); padding: 8px 20px; border-radius: 20px; font-weight: bold; margin-bottom: 20px; display: inline-block; border: 1px solid var(--primary); }
        .avviso-invitati { background: #fff3cd; color: #856404; padding: 15px; border-radius: 8px; border-left: 4px solid #ffeeba; margin-top: 20px; font-size: 14px; }

        .form-group { margin-bottom: 20px; }
        .form-group input[type="text"], .form-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; font-size: 14px; box-sizing: border-box; }
        .form-group input:disabled { background-color: #f5f5f5; color: #aaa; cursor: not-allowed; }
        
        .row-autore { display: flex; align-items: center; gap: 15px; }
        .row-autore input[type="text"] { flex: 1; }
        .row-autore .anonimo-check { display: flex; align-items: center; gap: 5px; font-size: 14px; color: var(--text-muted); cursor: pointer; white-space: nowrap; }

        button.btn-submit { background-color: var(--primary); color: white; border: none; padding: 14px 24px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; width: 100%; margin-bottom: 10px; transition: 0.3s; }
        button.btn-submit:hover { background: var(--primary-hover); transform: translateY(-2px); }

        #crossword-container { margin-top: 20px; overflow-x: auto; text-align: center; padding: 10px; background: #fff; border: 1px solid #eee; border-radius: 8px; }
        .cw-grid { border-collapse: collapse; margin: 0 auto; background: white; border: 2px solid #000; }
        .cw-cell { width: 35px; height: 35px; background: white; border: 1px solid #000; text-align: center; vertical-align: middle; position: relative; font-weight: bold; text-transform: uppercase; font-family: monospace; font-size: 18px; }
        .cw-empty { background: transparent; border: none; width: 35px; height: 35px; }
        .cw-number { position: absolute; top: 1px; left: 2px; font-size: 10px; color: #000; line-height: 1; font-weight: normal; font-family: sans-serif; }
        
        .idea-card { background: #f9f9f9; border-left: 4px solid var(--primary); padding: 15px; border-radius: 8px; margin-bottom: 15px; position: relative; word-wrap: break-word; }
        .btn-del { position: absolute; right: 10px; top: 10px; background: none; border: none; cursor: pointer; color: #e74c3c; font-weight: bold; font-size: 16px; }

        /* LAVAGNA INTERATTIVA E STRUMENTI */
        .toolbar-anteprima { display: flex; gap: 8px; margin-bottom: 10px; justify-content: center; flex-wrap: wrap; align-items: center; }
        .btn-tool { padding: 8px 12px; border-radius: 8px; border: none; font-weight: 600; cursor: pointer; font-size: 13px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .style-select { padding: 6px 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 13px; font-family: inherit; }
        .color-picker { padding: 0; width: 35px; height: 35px; border: 1px solid #ddd; border-radius: 8px; cursor: pointer; }
        
        .info-cartellone { font-size: 13px; text-align: center; color: #e67e22; margin-bottom: 10px; }

        /* CONTROLLI ZOOM MANUALI */
        .zoom-controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 15px; }
        .btn-zoom { background: #ecf0f1; border: 1px solid #bdc3c7; border-radius: 5px; width: 40px; height: 35px; font-size: 20px; font-weight: bold; color: #2c3e50; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .lbl-zoom { font-weight: bold; color: var(--primary); min-width: 50px; text-align: center; font-size: 14px; }

        /* WORKSPACE CON ZOOM ISOLATO */
        .workspace { width: 100%; height: 65vh; overflow: auto; background: #dcdde1; border-radius: 8px; border: 2px solid #bdc3c7; box-shadow: inset 0 0 10px rgba(0,0,0,0.1); touch-action: pan-x pan-y; }
        #zoom-wrapper { position: relative; width: 800px; height: 1142px; margin: 0 auto; transform-origin: top left; }
        #cartellone-lavagna { position: absolute; top: 0; left: 0; width: 800px; height: 1142px; background: white; border: 1px solid #999; box-shadow: 0 10px 30px rgba(0,0,0,0.15); font-family: 'Times New Roman', serif; background-image: radial-gradient(#eee 1px, transparent 1px); background-size: 20px 20px; transform-origin: top left; }
        
        /* BOX TRASCINABILI */
        .drag-box { position: absolute; background: transparent; border: 2px dashed #3498db; display: flex; flex-direction: column; min-width: 50px; min-height: 40px; box-sizing: border-box; transition: top 0.4s ease, left 0.4s ease, width 0.4s ease; }
        .drag-box:hover { z-index: 100; background: rgba(255,255,255,0.7); }
        
        /* BARRA BLU SOTTILE */
        .drag-handle { background: #3498db; padding: 2px 6px; color: white; display: flex; justify-content: space-between; align-items: center; cursor: move; touch-action: none; height: 22px; }
        .drag-handle button { background: none; border: none; color: white; cursor: pointer; font-weight: bold; font-size: 14px; padding: 0; line-height: 1; }
        
        .drag-content { position: relative; flex: 1; overflow: hidden; outline: none; background: transparent; }
        .drag-content[contenteditable="true"]:focus { background: rgba(255, 253, 231, 0.9); }
        
        .zoom-fit { position: absolute; top: 0; left: 0; transform-origin: top left; width: max-content; height: max-content; }
        
        /* Modifiche Elementi */
        .drag-content .cw-grid { border: 2px solid #000; margin: 0; background: white; }
        .drag-content .cw-cell { width: 35px; height: 35px; font-size: 18px; }
        .drag-content .cw-empty { width: 35px; height: 35px; }
        
        .cart-titolo-txt { font-size: 45px; text-align: center; font-weight: bold; text-transform: uppercase; line-height: 1.1; margin: 0; white-space: nowrap; padding: 5px; }
        .cart-papiro-txt { font-size: 18px; text-align: justify; width: 450px; padding: 10px; box-sizing: border-box; }
        .cart-caricatura-ph { width: 300px; height: 400px; border: 3px dashed #bdc3c7; display: flex; align-items: center; justify-content: center; color: #7f8c8d; background: #f9f9f9; text-align: center; font-size: 24px; box-sizing: border-box; }

        .resize-handle { position: absolute; bottom: -3px; right: -3px; width: 30px; height: 30px; background: linear-gradient(135deg, transparent 50%, var(--primary) 50%); cursor: nwse-resize; z-index: 10; touch-action: none; border-bottom-right-radius: 4px; }

        /* MODALITA STAMPA */
        .stampa-mode .drag-handle, .stampa-mode .resize-handle { display: none !important; }
        .stampa-mode .drag-box { border: none !important; background: transparent !important; }
        .stampa-mode #cartellone-lavagna { background-image: none !important; }
    </style>
</head>
<body>

    <header>
        <h1>🎓 SiLaurea App</h1>
    </header>

    <nav id="main-nav">
        <button class="tab-link active" onclick="apriSezione('home', this)">🏠 Home</button>
        <button class="tab-link" onclick="apriSezione('cruciverba', this)">🧩 Cruciverba</button>
        <button class="tab-link" onclick="apriSezione('caricatura', this)">🎨 Caricatura</button>
        <button class="tab-link" onclick="apriSezione('papiro', this)">📜 Papiro</button>
        <button class="tab-link" onclick="apriSezione('regalo', this)">🎁 Regalo</button>
        <button class="tab-link" style="background-color: #f1c40f; color: #333;" onclick="apriAnteprima(this)">🖼️ Lavagna Cartellone</button>
        <button class="tab-link btn-esci" onclick="esci()">🚪 Esci</button>
    </nav>

    <main>
        <div id="login-section" class="section active">
            <h2>Gestione Evento</h2>
            <div class="form-group">
                <input type="text" id="input-laureato" placeholder="Nome (es: Lisa Rossi)">
            </div>
            <button class="btn-submit" onclick="creaNuovaArea()">Crea Area Sicura & Genera Link</button>
        </div>

        <div id="home" class="section">
            <div id="display-laureato" class="badge-laureato"></div>
            <h2>Pronti per la festa? 🎉</h2>
            <div class="form-group">
                <input type="text" id="share-link" readonly onclick="this.select(); document.execCommand('copy'); alert('Link copiato negli appunti!');">
            </div>
        </div>

        <div id="cruciverba" class="section">
            <h2>🧩 Cruciverba</h2>
            <div class="form-group row-autore">
                <input type="text" id="cruci-autore" placeholder="Il tuo nome">
                <label class="anonimo-check"><input type="checkbox" onchange="toggleAnonimo('cruci-autore', this)"> Anonimo</label>
            </div>
            <div class="form-group"><input type="text" id="cruci-parola" placeholder="Parola (es. SPRITZ)"></div>
            <div class="form-group"><textarea id="cruci-def" rows="2" placeholder="Definizione..."></textarea></div>
            <button class="btn-submit" onclick="aggiungi('cruciverba')">Salva</button>
            <button class="btn-submit" style="background:#2c3e50" onclick="generaCruciverbaMagico()">🎲 Crea Griglia da Stampare</button>
            <div id="crossword-wrapper" style="display: none; margin-top:30px;"><div id="crossword-container"></div><div id="crossword-clues"></div></div>
            <div class="lista-idee"><div id="lista-cruciverba"></div></div>
        </div>

        <div id="caricatura" class="section">
            <h2>🎨 Caricatura</h2>
            <div class="form-group"><textarea id="cari-idea" rows="3" placeholder="Idea per il disegno..."></textarea></div>
            <button class="btn-submit" onclick="aggiungi('caricatura')">Invia Proposta</button>
            <div class="lista-idee"><div id="lista-caricatura"></div></div>
        </div>

        <div id="papiro" class="section">
            <h2>📜 Papiro</h2>
            <div class="form-group row-autore">
                <input type="text" id="papiro-autore" placeholder="Il tuo nome">
                <label class="anonimo-check"><input type="checkbox" onchange="toggleAnonimo('papiro-autore', this)"> Anonimo</label>
            </div>
            <div class="form-group"><textarea id="papiro-aneddoto" rows="3" placeholder="Scrivi un aneddoto..."></textarea></div>
            <button class="btn-submit" onclick="aggiungi('papiro')">Aggiungi al Papiro</button>
            <div class="lista-idee"><div id="lista-papiro"></div></div>
        </div>

        <div id="regalo" class="section">
            <h2>🎁 Regalo</h2>
            <div class="form-group"><textarea id="reg-idea" rows="2" placeholder="Cosa regaliamo?"></textarea></div>
            <button class="btn-submit" onclick="aggiungi('regalo')">Proponi Regalo</button>
            <div class="lista-idee"><div id="lista-regalo"></div></div>
        </div>

        <div id="anteprima" class="section" style="padding:15px;">
            <div class="toolbar-anteprima">
                <button class="btn-tool" style="background:#8e44ad; color:white;" onclick="cambiaLayout()">🔀 Layout Auto</button>
                <button class="btn-tool" style="background:#e67e22; color:white;" onclick="centraTitolo()">↔️ Centra Titolo</button>
                <button class="btn-tool" style="background:#2ecc71; color:white;" onclick="aggiornaDatiAnteprima()">🔄 Aggiorna Dati</button>
                <button class="btn-tool" style="background:#3498db; color:white;" onclick="toggleStampa()">👁️ Stampa</button>
                
                <select id="cart-font" class="style-select" onchange="cambiaStile()">
                    <option value="'Times New Roman', serif">Times New Roman</option>
                    <option value="'Arial', sans-serif">Arial</option>
                    <option value="'Courier New', monospace">Courier</option>
                    <option value="'Comic Sans MS', cursive">Comic Sans</option>
                </select>
                <input type="color" id="cart-color" class="color-picker" value="#c0392b" onchange="cambiaStile()" title="Colore Titoli">
            </div>
            
            <div class="info-cartellone">
                <b>📐 Formato Cartellone 70x100 cm</b><br>
                Usa i tasti + e - per zoomare, e fai scorrere la finestra per muoverti.
            </div>

            <div class="zoom-controls">
                <button class="btn-zoom" onclick="modificaZoom(-0.1)">-</button>
                <span class="lbl-zoom" id="lbl-zoom">100%</span>
                <button class="btn-zoom" onclick="modificaZoom(0.1)">+</button>
            </div>
            
            <div class="workspace" id="workspace">
                <div id="zoom-wrapper">
                    <div id="cartellone-lavagna">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SUPABASE_URL = 'https://dfjvdenqbokvtmsqyjsh.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmanZkZW5xYm9rdnRtc3F5anNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MTM1MzAsImV4cCI6MjA4ODE4OTUzMH0.kOvBhb3bnJT562q8nOGJFwgf7Lf28soDV0yIhyF0BCI';
        
        let clientSupabase;
        try { clientSupabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY); } catch(e) {}

        let idEventoSegreto = ""; 
        let nomeVisuale = "";
        let dati = { cruciverba: [], caricatura: [], papiro: [], regalo: [] };
        
        let currentZoom = 1.0;
        let currentLayoutIndex = 0; 

        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const idInvitato = params.get('id'); 
            if (idInvitato) {
                idEventoSegreto = idInvitato;
                avviaApp(); 
            }
        };

        window.toggleAnonimo = function(inputId, checkbox) {
            let inputField = document.getElementById(inputId);
            inputField.disabled = checkbox.checked;
            if(checkbox.checked) inputField.value = ''; 
        };

        window.creaNuovaArea = function() {
            const nomePulito = document.getElementById('input-laureato').value.trim().toLowerCase().replace(/\s+/g, '');
            if(!nomePulito) return alert("Inserisci il nome!");
            idEventoSegreto = `${nomePulito}-${Math.random().toString(36).substring(2, 7)}`;
            try { window.history.pushState({}, '', `?id=${idEventoSegreto}`); } catch(err) {}
            avviaApp();
        };

        window.esci = function() {
            if(!confirm("Vuoi uscire dall'area di questo evento?")) return;
            window.location.href = window.location.pathname;
        };

        window.avviaApp = function() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('main-nav').style.display = 'flex';
            apriSezione('home', document.querySelector('.tab-link'));
            let nomeRaw = idEventoSegreto.split('-')[0];
            nomeVisuale = nomeRaw.charAt(0).toUpperCase() + nomeRaw.slice(1);
            document.getElementById('display-laureato').innerText = `🎓 Area dedicata a: ${nomeVisuale}`;
            document.getElementById('share-link').value = `${window.location.href.split('?')[0]}?id=${idEventoSegreto}`;
            caricaDati();
        };

        window.apriSezione = function(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-link').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(el) el.classList.add('active');
        };

        // --- GESTIONE ZOOM AVANZATO ---
        window.modificaZoom = function(delta) {
            currentZoom += delta;
            if(currentZoom < 0.2) currentZoom = 0.2;
            if(currentZoom > 2.5) currentZoom = 2.5;
            applicaZoomCorrente();
        };

        function applicaZoomCorrente() {
            document.getElementById('lbl-zoom').innerText = Math.round(currentZoom * 100) + '%';
            let cartellone = document.getElementById('cartellone-lavagna');
            let wrapper = document.getElementById('zoom-wrapper');
            
            cartellone.style.transform = `scale(${currentZoom})`;
            wrapper.style.width = (800 * currentZoom) + 'px';
            wrapper.style.height = (1142 * currentZoom) + 'px';
        }

        // Pinch to Zoom su cellulare
        const workspace = document.getElementById('workspace');
        let initZoomDist = 0;
        let initZoomZ = 1;
        workspace.addEventListener('touchstart', (e) => {
            if(e.touches.length === 2) {
                e.preventDefault(); 
                initZoomDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                initZoomZ = currentZoom;
            }
        }, {passive: false});

        workspace.addEventListener('touchmove', (e) => {
            if(e.touches.length === 2) {
                e.preventDefault();
                let currDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
                currentZoom = Math.min(Math.max(0.2, initZoomZ * (currDist / initZoomDist)), 2.5);
                applicaZoomCorrente();
            }
        }, {passive: false});


        window.apriAnteprima = function(el) {
            apriSezione('anteprima', el);
            // Adatta lo zoom per mostrare tutto il cartellone nello schermo del telefono
            let screenW = document.getElementById('workspace').clientWidth;
            currentZoom = screenW / 850; 
            if(currentZoom > 1) currentZoom = 1;
            applicaZoomCorrente();
            aggiornaDatiAnteprima();
        };

        window.toggleStampa = function() {
            document.getElementById('anteprima').classList.toggle('stampa-mode');
        };

        window.cambiaStile = function() {
            let font = document.getElementById('cart-font').value;
            let color = document.getElementById('cart-color').value;
            let lavagna = document.getElementById('cartellone-lavagna');
            if(lavagna) {
                lavagna.style.fontFamily = font;
                lavagna.querySelectorAll('.cart-titolo-txt, h3').forEach(t => t.style.color = color);
            }
        };

        // I Layout Automatici
        const presetLayouts = [
            { TITOLO: {t: 2, l: 5, w: 90}, CARICATURA: {t: 12, l: 5, w: 40}, PAPIRO: {t: 12, l: 50, w: 45}, CRUCIVERBA: {t: 50, l: 5, w: 40}, DEFINIZIONI: {t: 50, l: 50, w: 45} },
            { TITOLO: {t: 2, l: 5, w: 90}, PAPIRO: {t: 12, l: 5, w: 45}, CARICATURA: {t: 12, l: 55, w: 40}, CRUCIVERBA: {t: 50, l: 50, w: 45}, DEFINIZIONI: {t: 50, l: 5, w: 40} },
            { TITOLO: {t: 2, l: 5, w: 90}, CARICATURA: {t: 12, l: 30, w: 40}, PAPIRO: {t: 50, l: 5, w: 90}, CRUCIVERBA: {t: 70, l: 5, w: 40}, DEFINIZIONI: {t: 70, l: 50, w: 45} }
        ];

        window.cambiaLayout = function() {
            currentLayoutIndex = (currentLayoutIndex + 1) % presetLayouts.length;
            let layout = presetLayouts[currentLayoutIndex];
            for(let key in layout) {
                let box = document.getElementById('box-' + key);
                if(box) {
                    box.style.transition = 'all 0.5s ease';
                    box.style.top = layout[key].t + '%';
                    box.style.left = layout[key].l + '%';
                    box.style.width = layout[key].w + '%';
                    setTimeout(() => box.style.transition = 'none', 500);
                }
            }
            setTimeout(forzaRicalcoloAltezze, 550);
        };

        window.centraTitolo = function() {
            let box = document.getElementById('box-TITOLO');
            if(box) {
                box.style.left = '50%';
                box.style.transform = 'translateX(-50%)';
                box.dataset.centered = "true"; 
            }
        };

        // --- MOTORE BOX E DRAG/DROP ---
        window.aggiornaDatiAnteprima = async function() {
            // TRY/CATCH PROTETTIVO PER IMPEDIRE IL "CARTELLONE VUOTO"
            try { await caricaDati(); } catch(e) { console.log("Errore DB, uso dati cache"); }
            
            let lavagna = document.getElementById('cartellone-lavagna');
            if(!lavagna) return;
            lavagna.innerHTML = ''; 
            
            let l = presetLayouts[currentLayoutIndex];

            creaBox("TITOLO", `<div class="cart-titolo-txt" contenteditable="true">LAUREA DI ${nomeVisuale.toUpperCase()}</div>`, l.TITOLO.t, l.TITOLO.l, l.TITOLO.w);
            creaBox("CARICATURA", `<div class="cart-caricatura-ph">📸<br>Spazio Caricatura</div>`, l.CARICATURA.t, l.CARICATURA.l, l.CARICATURA.w);

            let testiPapiro = dati.papiro.map(p => `<p style="margin:5px 0;">"${p.aneddoto}"</p>`).join('');
            if(!testiPapiro) testiPapiro = "<p>Nessun aneddoto inserito.</p>";
            creaBox("PAPIRO", `<div class="cart-papiro-txt" contenteditable="true"><h3 style="margin:0 0 10px 0; text-align:center;">IL PAPIRO</h3>${testiPapiro}</div>`, l.PAPIRO.t, l.PAPIRO.l, l.PAPIRO.w);

            let gridHtml = document.querySelector('#crossword-container .cw-grid') ? document.querySelector('#crossword-container .cw-grid').outerHTML : "<i style='font-size:16px; padding:10px;'>Genera cruciverba!</i>";
            creaBox("CRUCIVERBA", gridHtml, l.CRUCIVERBA.t, l.CRUCIVERBA.l, l.CRUCIVERBA.w);

            let defsHtml = document.getElementById('crossword-clues') ? document.getElementById('crossword-clues').innerHTML : "";
            if(defsHtml) {
                let cleanDefs = defsHtml.replace(/class="cw-clues-col"/g, 'style="flex:1;"');
                creaBox("DEFINIZIONI", `<div style="display:flex; width:100%; gap:15px; font-size:14px;" contenteditable="true">${cleanDefs}</div>`, l.DEFINIZIONI.t, l.DEFINIZIONI.l, l.DEFINIZIONI.w);
            }

            setTimeout(() => {
                attivaMotoreMagico();
                cambiaStile();
            }, 100); 
        };

        function creaBox(label, content, top, left, widthPercent) {
            let box = document.createElement('div');
            box.className = 'drag-box';
            box.id = 'box-' + label;
            box.style.top = top + '%';
            box.style.left = left + '%';
            box.style.width = widthPercent + '%';
            
            box.innerHTML = `
                <div class="drag-handle"><span style="font-size:14px;">✋</span><button onclick="this.parentElement.parentElement.remove()">❌</button></div>
                <div class="drag-content"><div class="zoom-fit">${content}</div></div>
                <div class="resize-handle"></div>
            `;
            document.getElementById('cartellone-lavagna').appendChild(box);
        }

        function forzaRicalcoloAltezze() {
            document.querySelectorAll('.drag-box').forEach(box => {
                const handle = box.querySelector('.drag-handle');
                const zoomTarget = box.querySelector('.zoom-fit');
                const inner = zoomTarget.firstElementChild;
                if(!inner) return;

                let naturalW = inner.offsetWidth || 100;
                let naturalH = inner.offsetHeight || 100;
                let handleH = handle ? handle.offsetHeight : 24;
                let currentBoxW = box.offsetWidth || parseInt(box.style.width) * 8 || 200;
                
                let initialScale = currentBoxW / naturalW;
                if(isNaN(initialScale) || initialScale === Infinity || initialScale === 0) initialScale = 1;
                
                box.style.height = (naturalH * initialScale + handleH) + 'px';
                zoomTarget.style.transform = `scale(${initialScale})`;
            });
        }

        function attivaMotoreMagico() {
            forzaRicalcoloAltezze(); 

            document.querySelectorAll('.drag-box').forEach(box => {
                if(box.dataset.active) return;
                box.dataset.active = "true";

                const handle = box.querySelector('.drag-handle');
                const resizer = box.querySelector('.resize-handle');
                const zoomTarget = box.querySelector('.zoom-fit');
                const inner = zoomTarget.firstElementChild;
                if(!inner) return;

                if (inner.getAttribute('contenteditable') === "true") {
                    inner.addEventListener('input', () => {
                        let nH = inner.offsetHeight;
                        let scaleStr = zoomTarget.style.transform;
                        let currentScale = 1;
                        if(scaleStr.includes('scale')) currentScale = parseFloat(scaleStr.replace('scale(', '').replace(')', ''));
                        box.style.height = (nH * currentScale + handle.offsetHeight) + 'px';
                    });
                }

                // SPOSTAMENTO (DRAG) PERFETTAMENTE CALIBRATO CON LO ZOOM
                let startX, startY, startLeft, startTop, startWidth;

                function initDrag(e) {
                    if(e.target.tagName === 'BUTTON') return; 
                    e.preventDefault();
                    if(box.dataset.centered) { box.style.transform = 'none'; box.dataset.centered = ""; }
                    
                    startX = e.clientX || e.touches[0].clientX;
                    startY = e.clientY || e.touches[0].clientY;
                    startLeft = box.offsetLeft;
                    startTop = box.offsetTop;
                    
                    document.addEventListener('mousemove', doDrag, {passive: false});
                    document.addEventListener('touchmove', doDrag, {passive: false});
                    document.addEventListener('mouseup', stopAll, false);
                    document.addEventListener('touchend', stopAll, false);
                }

                function doDrag(e) {
                    e.preventDefault();
                    let currentX = e.clientX || (e.touches ? e.touches[0].clientX : startX);
                    let currentY = e.clientY || (e.touches ? e.touches[0].clientY : startY);
                    
                    let deltaX = (currentX - startX) / currentZoom;
                    let deltaY = (currentY - startY) / currentZoom;

                    box.style.left = (startLeft + deltaX) + 'px';
                    box.style.top = (startTop + deltaY) + 'px';
                }

                handle.addEventListener('mousedown', initDrag, false);
                handle.addEventListener('touchstart', initDrag, {passive: false});

                // RESIZE CON ASPECT RATIO LOCK
                function initResize(e) {
                    e.preventDefault(); e.stopPropagation();
                    startX = e.clientX || e.touches[0].clientX;
                    startWidth = box.offsetWidth;
                    document.addEventListener('mousemove', doResize, {passive: false});
                    document.addEventListener('touchmove', doResize, {passive: false});
                    document.addEventListener('mouseup', stopAll, false);
                    document.addEventListener('touchend', stopAll, false);
                }

                function doResize(e) {
                    e.preventDefault();
                    let currentX = e.clientX || (e.touches ? e.touches[0].clientX : startX);
                    let deltaX = (currentX - startX) / currentZoom;
                    
                    let newW = startWidth + deltaX;
                    if (newW < 50) newW = 50; 

                    let natW = inner.offsetWidth;
                    let natH = inner.offsetHeight;

                    let newScale = newW / natW;
                    let newH = (natH * newScale) + handle.offsetHeight;

                    box.style.width = newW + 'px';
                    box.style.height = newH + 'px';
                    zoomTarget.style.transform = `scale(${newScale})`;
                }

                if(resizer) {
                    resizer.addEventListener('mousedown', initResize, false);
                    resizer.addEventListener('touchstart', initResize, {passive: false});
                }

                function stopAll() {
                    document.removeEventListener('mousemove', doDrag, false);
                    document.removeEventListener('touchmove', doDrag, false);
                    document.removeEventListener('mousemove', doResize, false);
                    document.removeEventListener('touchmove', doResize, false);
                    document.removeEventListener('mouseup', stopAll, false);
                    document.removeEventListener('touchend', stopAll, false);
                }
            });
        }

        // --- METODI CARICAMENTO DATI ---
        window.caricaDati = async function() {
            if (!clientSupabase) return; 
            try {
                for (let t of ['cruciverba', 'caricatura', 'papiro', 'regalo']) {
                    const { data, error } = await clientSupabase.from(t).select('*').eq('laureato_tag', idEventoSegreto).order('created_at', {ascending: false});
                    if (error) { console.warn(error); continue; }
                    if (t === 'regalo' && data) data.sort((a, b) => b.voti - a.voti);
                    dati[t] = data || [];
                    aggiornaUI(t);
                }
            } catch (err) { console.error(err); }
        };

        window.aggiungi = async function(tipo) {
            let autoreId = tipo.substring(0,3) + '-autore';
            let testoId = tipo==='cruciverba' ? 'cruci-def' : (tipo==='caricatura' ? 'cari-idea' : (tipo==='papiro' ? 'papiro-aneddoto' : 'reg-idea'));
            let autInput = document.getElementById(autoreId);
            let aut = autInput && autInput.disabled ? "Anonimo" : (autInput ? autInput.value.trim() || "Anonimo" : "Anonimo");
            let testo = document.getElementById(testoId).value.trim();
            
            let obj = { autore: aut, laureato_tag: idEventoSegreto };
            if (tipo === 'cruciverba') {
                obj.parola = document.getElementById('cruci-parola').value.toUpperCase().replace(/[^A-Z]/g, '');
                obj.definizione = testo;
            } else if (tipo === 'caricatura') obj.idea_dettagliata = testo;
            else if (tipo === 'papiro') obj.aneddoto = testo;
            else { obj.proposta_regalo = testo; obj.voti = 0; }

            await clientSupabase.from(tipo).insert([obj]);
            document.getElementById(testoId).value = ''; 
            if(autInput && !autInput.disabled) autInput.value = ''; 
            if(tipo === 'cruciverba') document.getElementById('cruci-parola').value = '';
            caricaDati();
        };

        window.aggiornaUI = function(tipo) {
            const container = document.getElementById(`lista-${tipo}`);
            if(!container) return;
            container.innerHTML = dati[tipo].map(item => `
                <div class="idea-card">
                    <b>${item.autore}</b>: ${tipo === 'cruciverba' ? item.parola+': '+item.definizione : (item.idea_dettagliata || item.aneddoto || item.proposta_regalo)}
                </div>`).join('');
        };

        window.generaCruciverbaMagico = function() {
            if(dati.cruciverba.length < 2) return alert("Inserisci almeno 2 parole!");
            document.getElementById('crossword-wrapper').style.display = 'block';
            let words = [...dati.cruciverba].sort((a,b) => b.parola.length - a.parola.length);
            const SIZE = 60; let grid = Array(SIZE).fill(null).map(() => Array(SIZE).fill(null));
            let placedWords = [];

            function placeWord(w, r, c, dir) {
                for(let i=0; i<w.parola.length; i++) { if (dir==='H') grid[r][c+i] = w.parola[i]; else grid[r+i][c] = w.parola[i]; }
                placedWords.push({ ...w, r: r, c: c, dir: dir });
            }

            function canPlace(p, r, c, dir) {
                if (dir==='H' && c+p.length > SIZE) return false;
                if (dir==='V' && r+p.length > SIZE) return false;
                let inter = 0;
                for (let i=0; i<p.length; i++) {
                    let cR = dir==='H' ? r : r+i; let cC = dir==='H' ? c+i : c;
                    if (grid[cR][cC] === p[i]) { inter++; continue; }
                    if (grid[cR][cC] !== null) return false; 
                    if (dir==='H') { if (cR>0 && grid[cR-1][cC]) return false; if (cR<SIZE-1 && grid[cR+1][cC]) return false; }
                    else { if (cC>0 && grid[cR][cC-1]) return false; if (cC<SIZE-1 && grid[cR][cC+1]) return false; }
                }
                return inter > 0 || placedWords.length === 0;
            }

            let firstWord = words.shift();
            placeWord(firstWord, 30, 30 - Math.floor(firstWord.parola.length / 2), 'H');

            words.forEach(wordObj => {
                let placed = false;
                for (let p of placedWords) {
                    if (placed) break;
                    for (let i=0; i<p.parola.length; i++) {
                        for (let j=0; j<wordObj.parola.length; j++) {
                            if (p.parola[i] === wordObj.parola[j]) {
                                let nR = p.dir==='H' ? p.r-j : p.r+i;
                                let nC = p.dir==='H' ? p.c+i : p.c-j;
                                let nDir = p.dir==='H' ? 'V' : 'H';
                                if (canPlace(wordObj.parola, nR, nC, nDir)) { placeWord(wordObj, nR, nC, nDir); placed = true; break; }
                            }
                        }
                        if (placed) break;
                    }
                }
            });

            let minR=SIZE, maxR=0, minC=SIZE, maxC=0;
            for(let r=0; r<SIZE; r++) { for(let c=0; c<SIZE; c++) { if(grid[r][c]) { minR=Math.min(minR,r); maxR=Math.max(maxR,r); minC=Math.min(minC,c); maxC=Math.max(maxC,c); } } }
            minR = Math.max(0, minR-1); maxR = Math.min(SIZE-1, maxR+1); minC = Math.max(0, minC-1); maxC = Math.min(SIZE-1, maxC+1);

            let htmlTable = '<table class="cw-grid">';
            let numCounter = 1; let orizz = []; let verti = [];
            for (let r = minR; r <= maxR; r++) {
                htmlTable += '<tr>';
                for (let c = minC; c <= maxC; c++) {
                    if (grid[r][c] === null) { htmlTable += '<td class="cw-empty"></td>'; } 
                    else {
                        let startsHere = placedWords.filter(p => p.r === r && p.c === c);
                        if (startsHere.length > 0) {
                            htmlTable += `<td class="cw-cell"><span class="cw-number">${numCounter}</span></td>`;
                            startsHere.forEach(w => {
                                let dHtml = `<div style="margin-bottom:2px;line-height:1.1;"><b>${numCounter}.</b> ${w.definizione}</div>`;
                                if (w.dir === 'H') orizz.push(dHtml); else verti.push(dHtml);
                            });
                            numCounter++;
                        } else { htmlTable += `<td class="cw-cell"></td>`; }
                    }
                }
                htmlTable += '</tr>';
            }
            document.getElementById('crossword-container').innerHTML = htmlTable + '</table>';
            document.getElementById('crossword-clues').innerHTML = `<div class="cw-clues-col" style="margin-right:15px;"><h4>➡️ ORIZZONTALI</h4>${orizz.join('')}</div><div class="cw-clues-col"><h4>⬇️ VERTICALI</h4>${verti.join('')}</div>`;
        };
    </script>
</body>
